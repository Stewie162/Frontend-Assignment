<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Selection - Boutique Coffee Shop</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav id="main-nav">
        <div class="logo">Boutique Coffee</div>
        <ul>
          <li><a href="HomePage.html">Home</a></li>
          <li><a href="CoffeeSelection.html">Coffee Selection</a></li>
          <li><a href="BrewingEquiqment.html">Brewing Equipment</a></li>
          <li><a href="ShoppingCart.html">Shopping Cart</a></li>
          <li><a href="EventsAndWorkshops.html">Events & Workshops</a></li>
          <li><a href="SpecialOffer.html">Special Offers</a></li>
        </ul>
        <div class="mobile-menu-icon">☰</div>
      </nav>
    </header>

    <main>
      <section class="coffee-selection">
        <h1>Our Unique Blends</h1>
        <div class="search-container">
          <input
            type="text"
            id="coffee-search"
            placeholder="Search our coffee..."
          />
          <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <!-- Coffee products will be dynamically added here -->
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <div class="footer-section">
          <h3>Contact Us</h3>
          <p>Email: info@boutiquecoffee.com</p>
          <p>Phone: (123) 456-7890</p>
        </div>
        <div class="footer-section">
          <h3>Follow Us</h3>
          <div class="social-icons">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
        <div class="footer-section">
          <h3>Newsletter</h3>
          <form id="newsletter-form">
            <input type="email" placeholder="Enter your email" required />
            <button type="submit">Subscribe</button>
          </form>
        </div>
      </div>
      <div class="copyright">
        <p>&copy; 2024 Boutique Coffee. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="coffee-selection.js"></script>
  </body>
</html>
